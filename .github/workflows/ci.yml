name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build & Test (Android / JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Runs the linter (ktlint/detekt) and unit tests for commonMain and Android
      - name: Run Checks and Unit Tests
        run: ./gradlew :composeApp:check --no-daemon --stacktrace

      - name: Assemble Android Debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon

  ios:
    name: Build & Test (iOS)
    # macos-14 uses Apple Silicon (M1/M2) architecture, ideal for fast KMP compilation
    runs-on: macos-14 
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Verifies that commonMain and iosMain code compiles and passes tests on iOS Simulator
      - name: Run iOS Simulator Tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test --no-daemon --stacktrace

  gga-validation:
    name: AI Guardian Angel (GGA)
    runs-on: ubuntu-latest
    needs: [ android, ios ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar GGA
        run: |
          git clone https://github.com/Gentleman-Programming/gentleman-guardian-angel.git /tmp/gga
          cd /tmp/gga
          bash install.sh
          echo "$HOME/bin" >> $GITHUB_PATH
          npm install -g @google/gemini-cli
          echo "$(npm root -g)/../bin" >> $GITHUB_PATH

      - name: Ejecutar Gentleman Guardian Angel
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: true
        run: gga run --ci



