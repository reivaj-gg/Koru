name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build & Test (Android / JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Runs the linter (ktlint/detekt) and unit tests for commonMain and Android
      - name: Run Checks and Unit Tests
        run: ./gradlew :composeApp:check --no-daemon --stacktrace

      - name: Assemble Android Debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon

  ios:
    name: Build & Test (iOS)
    # macos-14 uses Apple Silicon (M1/M2) architecture, ideal for fast KMP compilation
    runs-on: macos-14 
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Verifies that commonMain and iosMain code compiles and passes tests on iOS Simulator
      - name: Run iOS Simulator Tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test --no-daemon --stacktrace

  gga-validation:
    name: AI Guardian Angel (GGA)
    runs-on: ubuntu-latest
    needs: [android, ios] # Only runs if tests pass
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      
      - name: Setup Go (For GGA)
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run Gentleman Guardian Angel
        run: |
          go install github.com/gentleman-programming/gentle-ai/cmd/gentle-ai@latest
          gentle-ai gga --ci