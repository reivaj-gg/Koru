name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Build & Test (Android / JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Ejecuta el linter (si tienes ktlint/detekt) y las pruebas unitarias de commonMain y Android
      - name: Run Checks and Unit Tests
        run: ./gradlew :composeApp:check --no-daemon --stacktrace

      - name: Assemble Android Debug APK
        run: ./gradlew :composeApp:assembleDebug --no-daemon

  ios:
    name: Build & Test (iOS)
    # macos-14 usa la arquitectura Apple Silicon (M1/M2), ideal para compilar KMP rápido
    runs-on: macos-14 
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Verifica que el código de commonMain y iosMain compile y pase las pruebas en el simulador de iOS
      - name: Run iOS Simulator Tests
        run: ./gradlew :composeApp:iosSimulatorArm64Test --no-daemon --stacktrace
